# /etc/nginx/sites-available/ensemble.conf
#
# Layout (same TLS cert — Tencent DV covers both names):
#   ensemble-ai.cn        ⇒ API + installer downloads (backend / operational)
#   www.ensemble-ai.cn    ⇒ official website (reserved; placeholder for now)
#
# Rationale: the website (under active development) shouldn't share a root
# path with downloads or the version-manifest endpoint. Apex domain hosts
# the backend; www hosts the public brand site. When the website becomes a
# static export, swap the `root` directive in the www vhost.

# ─── HTTP → HTTPS redirect (both names) ──────────────────────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name ensemble-ai.cn www.ensemble-ai.cn;
    location / { return 301 https://$host$request_uri; }
}

# Shared rate-limit zones used by the apex vhost. Defined at file level
# (http{} scope after include) so both server blocks can reference them.
limit_req_zone $binary_remote_addr zone=ensemble_api:10m rate=30r/m;
limit_conn_zone $binary_remote_addr zone=ensemble_dl:10m;
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# ─── HTTPS — apex (backend: API + downloads) ─────────────────────────────────
server {
    # nginx 1.24 (Ubuntu 24.04) uses the inline `http2` token, not the
    # standalone `http2 on;` directive from 1.25+.
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ensemble-ai.cn;

    ssl_certificate     /etc/nginx/ssl/ensemble-ai/fullchain.crt;
    ssl_certificate_key /etc/nginx/ssl/ensemble-ai/server.key;
    # Server-scoped SSL knobs (we can't put these at http{} scope from a
    # sites-enabled snippet without duplicating Ubuntu's defaults in
    # /etc/nginx/nginx.conf — those already set ssl_prefer_server_ciphers).
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Reverse-proxy the version-update API to the Node sidecar.
    location = /healthz {
        proxy_pass http://127.0.0.1:8787;
        access_log off;
    }
    # Cloud account APIs are browser-facing write endpoints and include a
    # websocket realtime channel. Let the Node app own cloud CORS so nginx
    # does not duplicate Access-Control-* headers with the backend.
    location ^~ /v1/cloud/ {
        limit_req zone=ensemble_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_connect_timeout 2s;
    }
    location /v1/ {
        limit_req zone=ensemble_api burst=20 nodelay;
        # CORS — the desktop app's update check fetches this endpoint from
        # the Tauri webview, whose origin is tauri://localhost (macOS/Linux)
        # or http://tauri.localhost (Windows). Without ACAO, the browser
        # silently blocks the response and the update prompt never appears.
        # Public read-only manifest + no creds → `*` is the right value.
        # Preflight (OPTIONS) short-circuited to 204 so we don't proxy it.
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, If-None-Match, If-Modified-Since" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0 always;
            add_header Content-Type "text/plain charset=UTF-8" always;
            return 204;
        }
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Expose-Headers "ETag, Last-Modified" always;
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 5s;
        proxy_connect_timeout 2s;
    }

    # Installer static download.
    location /download/ {
        limit_conn ensemble_dl 4;
        alias /var/www/ensemble-dl/download/;
        autoindex off;
        sendfile on;
        tcp_nopush on;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        if ($request_uri ~* "\.\.") { return 404; }
        try_files $uri =404;
    }

    # The public apex root must land on the ICP-bearing website. Keep API
    # and installer paths above on the apex host.
    location = / {
        return 302 https://www.ensemble-ai.cn/;
    }
    location / { return 404; }
}

# ─── HTTPS — www (official website; placeholder until launch) ────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.ensemble-ai.cn;

    ssl_certificate     /etc/nginx/ssl/ensemble-ai/fullchain.crt;
    ssl_certificate_key /etc/nginx/ssl/ensemble-ai/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Static site files. `ensemble_web` deploys to /var/www/ensemble-site/
    # via its own deploy.sh; nginx serves them directly here.
    root /var/www/ensemble-site;
    index index.html;
    # Short cache while the site is under active iteration. Assets are NOT
    # content-hashed yet, so a 30-day cache traps visitors on stale versions
    # whenever css/js changes. 1 hour + must-revalidate is the right floor
    # for now; once we ship hashed filenames we can move back to immutable.
    location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600, must-revalidate" always;
    }
    # The cloud workspace UI is served from www, while the canonical API host
    # is the apex domain. Proxy cloud API calls here as a compatibility
    # fallback for users who paste the www workspace URL into the Server field
    # or have an older cached workspace.js.
    location ^~ /v1/cloud/ {
        limit_req zone=ensemble_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host ensemble-ai.cn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_connect_timeout 2s;
    }
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
    }
}
